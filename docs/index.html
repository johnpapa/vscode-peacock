<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Peacock - Subtly change the color of your VS Code workspace"
    />
    <title>Peacock for VS Code</title>

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="assets/peacock-icon-small.png" />

    <!-- Docsify Theme Base -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/docsify-themeable@0.9.0/dist/css/theme-simple.min.css"
    />

    <!-- Prism Syntax Highlighting -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/prismjs@1.30.0/themes/prism-tomorrow.min.css"
    />

    <!-- Inter Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="assets/docs.css" />
  </head>

  <body>
    <div id="app">Loading…</div>

    <script>
      window.$docsify = {
        name: '<img src="assets/peacock-icon-small.png" alt="Peacock" /> Peacock',
        repo: 'johnpapa/vscode-peacock',
        loadSidebar: true,
        loadNavbar: true,
        auto2top: true,
        coverpage: false,
        maxLevel: 3,
        subMaxLevel: 2,
        search: {
          placeholder: 'Search docs…',
          noData: 'No results found.',
          depth: 3,
        },
        plugins: [
          function fixSearchInput(hook) {
            hook.ready(function () {
              // Convert type="search" to type="text" to prevent browser
              // rendering native search decorations (magnifying glass icons)
              var input = document.querySelector('.search input[type="search"]');
              if (input) {
                input.type = 'text';
                input.placeholder = 'Search docs…';
              }
            });
          },
          function fixImagePaths(hook) {
            // Docsify prepends the route path to relative image src, breaking
            // resolution on both localhost and GitHub Pages. This plugin
            // normalizes all local image src to "assets/<file>" so the browser
            // resolves them relative to the page URL (the docs root).
            hook.doneEach(function () {
              document.querySelectorAll('.markdown-section img').forEach(function (img) {
                var src = img.getAttribute('src');
                if (
                  src &&
                  !src.startsWith('http') &&
                  !src.startsWith('data:') &&
                  !src.startsWith('//')
                ) {
                  var match = src.match(/(assets\/.+)/);
                  if (match) {
                    img.setAttribute('src', match[1]);
                  }
                }
              });
            });
          },
        ],
      };
    </script>

    <!-- Docsify Core -->
    <script src="https://cdn.jsdelivr.net/npm/docsify@4.13.1/lib/docsify.min.js"></script>

    <!-- Plugins -->
    <script src="https://cdn.jsdelivr.net/npm/docsify@4.13.1/lib/plugins/search.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/docsify-copy-code@3.0.2/dist/docsify-copy-code.min.js"></script>

    <!-- Prism Syntax Highlighting -->
    <script src="https://cdn.jsdelivr.net/npm/prismjs@1.30.0/components/prism-bash.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/prismjs@1.30.0/components/prism-javascript.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/prismjs@1.30.0/components/prism-json.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/prismjs@1.30.0/components/prism-typescript.min.js"></script>
  </body>
</html>
